{{- if and .Values.grafana.enabled .Values.grafana.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mysite.fullname" . }}-grafana
  labels:
    {{- include "mysite.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  {{- with .Values.grafana.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.grafana.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.grafana.ingress.host }}
      http:
        paths:
          - path: {{ .Values.grafana.ingress.path }}
            pathType: {{ .Values.grafana.ingress.pathType }}
            backend:
              service:
                name: {{ include "mysite.fullname" . }}-grafana
                port:
                  number: {{ .Values.grafana.service.port }}
{{- end }}
