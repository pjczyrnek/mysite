{{- if .Values.kubeStateMetrics.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.kubeStateMetrics.serviceAccountName }}
  labels:
    {{- include "mysite.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mysite.fullname" . }}-kube-state-metrics
  labels:
    {{- include "mysite.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
      - resourcequotas
      - replicationcontrollers
      - limitranges
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mysite.fullname" . }}-kube-state-metrics
  labels:
    {{- include "mysite.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mysite.fullname" . }}-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: {{ .Values.kubeStateMetrics.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
