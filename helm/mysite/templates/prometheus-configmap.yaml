{{- if .Values.prometheus.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mysite.fullname" . }}-prometheus-config
  labels:
    {{- include "mysite.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
{{- if .Values.nodeExporter.enabled }}

      - job_name: node-exporter
        static_configs:
          - targets: ["{{ include "mysite.fullname" . }}-node-exporter:{{ .Values.nodeExporter.service.port }}"]
{{- end }}
{{- if .Values.kubeStateMetrics.enabled }}

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["{{ include "mysite.fullname" . }}-kube-state-metrics:{{ .Values.kubeStateMetrics.service.port }}"]
{{- end }}
{{- if .Values.blackbox.enabled }}

      - job_name: blackbox
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - {{ tpl .Values.prometheus.blackboxTarget . | quote }}
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: {{ include "mysite.fullname" . }}-blackbox:{{ .Values.blackbox.service.port }}
{{- end }}
{{- end }}
